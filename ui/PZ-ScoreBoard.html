<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZ-ScoreBoard</title>
    <link rel="stylesheet" href="PZ_SB_styles.css">
</head>
<body>   


    <audio id="sound" src="PZ_Del_Sound.mp3"></audio>
    <div class="PZ-ScoreBoard" style="display: none;" id="PZ-ScoreBoard-ID" >
        <div class="PFimg"></div>
        <img src="img/Profile-RRC.png"  class="PFimg" >
        <img src="img/PZ_ScoreBoard.png"  class="ScoreBoard">

        <div class="PZf PZtext" style="left: 45.8%;">ID</div>
        <div class="PZf PZtext" style="left: 50.5%;">ONLINE</div>
        <div class="PZf PZtext" style="left: 57.4%;">PHONE</div>
        <div id="name-id"   class="PZf"        style="left: 45.5%; color: rgb(255, 255, 255);  font-size: 2.4vw;  padding-top:23%; transform: translate(0%, -50%);"></div>
        <div id="id-id"     class="PZf PZtext" style="left: 47.55%;"></div>
        <div id="online-id" class="PZf PZtext" style="left: 53.8%;"></div>
        <div id="phone-id"  class="PZf PZtext" style="left: 60.6%;"></div>



    </div>

    <script src="PZ_SB_script.js"></script>
</body>
</html>
